# Automatically merge Dependabot PRs based on semantic version update policy
# yamllint disable rule:truthy
---
name: Auto-Merge Dependabot PRs

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches-ignore:
      - 'gh-pages'

# default read-only permission
permissions:
  contents: read

jobs:
  auto-merge:
    if: >-
      ${{
        github.event.pull_request.user.login == 'dependabot[bot]' &&
        github.repository == 'OpenCCU/OpenCCU' &&
        github.event.pull_request.state == 'open' &&
        !github.event.pull_request.draft
      }}
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-24.04
    steps:
      - name: Fetch Dependabot metadata
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a  # v2
        with:
          github-token: ${{ secrets.AUTO_MERGE_TOKEN }}
          alert-lookup: true

      - name: Evaluate auto-merge policy
        id: policy
        env:
          DEPENDENCY_TYPE: ${{ steps.dependabot-metadata.outputs.dependency-type }}
          UPDATE_TYPE: ${{ steps.dependabot-metadata.outputs.update-type }}
          ALERT_STATE: ${{ steps.dependabot-metadata.outputs.alert-state }}
        run: |
          should_merge=false

          if [[ "${DEPENDENCY_TYPE}" == "direct:production" && "${UPDATE_TYPE}" == "version-update:semver-patch" ]]; then
            should_merge=true
          elif [[ "${DEPENDENCY_TYPE}" == "direct:production" && "${UPDATE_TYPE}" == "version-update:semver-minor" && "${ALERT_STATE}" == "OPEN" ]]; then
            should_merge=true
          elif [[ "${DEPENDENCY_TYPE}" == "direct:development" && ( "${UPDATE_TYPE}" == "version-update:semver-patch" || "${UPDATE_TYPE}" == "version-update:semver-minor" ) ]]; then
            should_merge=true
          fi

          echo "should_merge=${should_merge}" >>"${GITHUB_OUTPUT}"

      - name: Enable squash auto-merge
        if: steps.policy.outputs.should_merge == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.AUTO_MERGE_TOKEN }}
        run: gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"
