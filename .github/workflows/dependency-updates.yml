# OpenCCU Dependency update automation
# yamllint disable rule:truthy
---
name: Dependency Updates

on:
  schedule:
    - cron: '0 2 * * *'  # run daily at 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  dependency-updates:
    if: ${{ github.repository == 'OpenCCU/OpenCCU' }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - slug: buildroot
            script: scripts/update-buildroot.sh
          - slug: occu
            script: scripts/update-occu.sh
          - slug: qemu-guest-agent
            script: scripts/update-qemu-guest-agent.sh
          - slug: tailscale
            script: scripts/update-tailscale.sh
          - slug: neoserver
            script: scripts/update-neoserver.sh
          - slug: daemonize
            script: scripts/update-daemonize.sh

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Run dependency update script
        run: ./${{ matrix.script }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e  # v7.0.8
        with:
          branch: automation/dependency-updates-${{ matrix.slug }}
          delete-branch: true
          commit-message: "chore: update dependency via ${{ matrix.script }}"
          title: "chore: automated dependency update (${{ matrix.slug }})"
          body: |
            Automated nightly dependency updates generated by `${{ github.workflow }}`.

            Updated component script:
            - `${{ matrix.script }}`
          labels: dependencies
