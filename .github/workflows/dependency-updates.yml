# OpenCCU Dependency update automation
# yamllint disable rule:truthy
---
name: Dependency Updates

on:
  schedule:
    - cron: '0 2 * * *'  # run daily at 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  dependency-updates:
    if: ${{ github.repository == 'OpenCCU/OpenCCU' }}
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Run dependency update scripts
        run: |
          ./scripts/update-buildroot.sh
          ./scripts/update-occu.sh
          ./scripts/update-rpi-kernel.sh
          ./scripts/update-rpi-firmware.sh
          ./scripts/update-qemu-guest-agent.sh

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e  # v7.0.8
        with:
          branch: automation/dependency-updates
          delete-branch: true
          commit-message: "chore: update dependencies"
          title: "chore: automated dependency updates"
          body: |
            Automated nightly dependency updates generated by `/home/runner/work/OpenCCU/OpenCCU/.github/workflows/dependency-updates.yml`.

            Updated components are determined by:
            - `/home/runner/work/OpenCCU/OpenCCU/scripts/update-buildroot.sh`
            - `/home/runner/work/OpenCCU/OpenCCU/scripts/update-occu.sh`
            - `/home/runner/work/OpenCCU/OpenCCU/scripts/update-rpi-kernel.sh`
            - `/home/runner/work/OpenCCU/OpenCCU/scripts/update-rpi-firmware.sh`
            - `/home/runner/work/OpenCCU/OpenCCU/scripts/update-qemu-guest-agent.sh`
          labels: dependencies
